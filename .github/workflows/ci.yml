name: CI

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  COAST_SKIP_UI_BUILD: "1"

jobs:
  rust:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - name: macos-amd64
            os: macos-14
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.name }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.name }}-cargo-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --workspace --exclude coast-integration-tests

  frontend:
    name: frontend build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd coast-guard && npm ci

      - name: Generate TypeScript types from Rust
        run: cd coast-guard && COAST_SKIP_UI_BUILD=1 npm run generate:types

      - name: Verify generated types
        run: |
          count=$(ls coast-guard/src/types/generated/*.ts 2>/dev/null | wc -l)
          echo "Generated $count type files"
          if [ "$count" -lt 2 ]; then
            echo "::error::generate:types produced fewer than 2 files — Rust export_bindings likely failed"
            exit 1
          fi

      - name: Generate docs manifest
        run: cd coast-guard && node scripts/generate-docs.mjs

      - name: Build UI
        run: cd coast-guard && npm run build

      - name: Lint
        run: cd coast-guard && npm run lint
